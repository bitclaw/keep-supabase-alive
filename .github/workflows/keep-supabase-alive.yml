name: Keep Supabase Alive

on:
  schedule:
    # Runs daily at midnight UTC
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check required secrets
        run: |
          missing=0
          if [ -z "$SUPABASE_URL" ]; then
            echo "ERROR: SUPABASE_URL secret is not set."
            missing=1
          fi
          if [ -z "$SUPABASE_SECRET_KEY" ]; then
            echo "ERROR: SUPABASE_SECRET_KEY secret is not set."
            missing=1
          fi
          [ $missing -eq 1 ] && exit 1
          echo "All required secrets are present."
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}

      - name: Restore project if paused
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ vars.SUPABASE_PROJECT_REF }}
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ] || [ -z "$SUPABASE_PROJECT_REF" ]; then
            echo "SUPABASE_ACCESS_TOKEN or SUPABASE_PROJECT_REF not configured — skipping auto-restore."
            echo "Add these to enable automatic recovery from a paused state."
            exit 0
          fi

          echo "Checking project status..."
          response=$(curl --silent --max-time 15 \
            -H "Authorization: Bearer $SUPABASE_ACCESS_TOKEN" \
            "https://api.supabase.com/v1/projects/$SUPABASE_PROJECT_REF")

          status=$(echo "$response" | python3 -c "import sys,json; print(json.load(sys.stdin).get('status','unknown'))" 2>/dev/null || echo "unknown")
          echo "Project status: $status"

          if [ "$status" = "INACTIVE" ]; then
            echo "Project is paused. Sending restore request..."
            curl --fail --silent --show-error --max-time 30 \
              -X POST \
              -H "Authorization: Bearer $SUPABASE_ACCESS_TOKEN" \
              "https://api.supabase.com/v1/projects/$SUPABASE_PROJECT_REF/restore"
            echo "Restore request sent. Waiting 90 seconds for the project to come online..."
            sleep 90
          elif [ "$status" = "COMING_UP" ]; then
            echo "Project is already starting up. Waiting 60 seconds..."
            sleep 60
          else
            echo "Project is healthy (status: $status)."
          fi

      - name: Ping Supabase Database
        run: |
          curl --fail --silent --show-error --max-time 10 --retry 2 --retry-delay 5 \
          -X GET "${{ secrets.SUPABASE_URL }}/rest/v1/${{ vars.SUPABASE_TABLE_NAME }}?select=id&limit=1" \
          -H "apikey: ${{ secrets.SUPABASE_SECRET_KEY }}" \
          -H "Authorization: Bearer ${{ secrets.SUPABASE_SECRET_KEY }}"
          echo "Ping successful."
