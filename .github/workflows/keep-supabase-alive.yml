name: Keep Supabase Alive

on:
  schedule:
    # Runs at 00:00 UTC every Sunday and Friday
    - cron: '0 0 * * 0,5'
  workflow_dispatch:

permissions: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check secrets are configured
        run: |
          if [ -z "$SUPABASE_URL" ]; then
            echo "ERROR: SUPABASE_URL secret is not set."
            exit 1
          fi
          if [ -z "$SUPABASE_SECRET_KEY" ]; then
            echo "ERROR: SUPABASE_SECRET_KEY secret is not set."
            exit 1
          fi
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}

      - name: Ping Supabase Database
        run: |
          curl --fail --silent --show-error --max-time 10 --retry 2 --retry-delay 5 \
          -X GET "${{ secrets.SUPABASE_URL }}/rest/v1/YOUR_TABLE_NAME?select=id&limit=1" \
          -H "apikey: ${{ secrets.SUPABASE_SECRET_KEY }}" \
          -H "Authorization: Bearer ${{ secrets.SUPABASE_SECRET_KEY }}"
